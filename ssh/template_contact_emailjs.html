<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Contact Message</title>
</head>
<body style="margin:0;padding:0;background-color:#ffffff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#ffffff;">
    <tr>
      <td align="center" style="padding:48px 24px 24px;">

        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;">

          <!-- Header -->
          <tr>
            <td style="padding-bottom:32px;font-size:22px;font-weight:700;color:#1a1a1a;letter-spacing:-0.3px;">
              New Contact Message
            </td>
          </tr>

          <!-- Details -->
          <tr>
            <td style="padding-bottom:24px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f8f9fa;border-radius:8px;">
                <tr>
                  <td style="padding:16px 20px;">
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                      <tr>
                        <td style="font-size:12px;color:#80868b;padding-bottom:4px;">Name</td>
                      </tr>
                      <tr>
                        <td style="font-size:14px;color:#1a1a1a;font-weight:600;padding-bottom:12px;">{{from_name}}</td>
                      </tr>
                      <tr>
                        <td style="font-size:12px;color:#80868b;padding-bottom:4px;">Email</td>
                      </tr>
                      <tr>
                        <td style="font-size:14px;color:#1a1a1a;font-weight:600;padding-bottom:12px;">{{from_email}}</td>
                      </tr>
                      <tr>
                        <td style="font-size:12px;color:#80868b;padding-bottom:4px;">Company</td>
                      </tr>
                      <tr>
                        <td style="font-size:14px;color:#1a1a1a;font-weight:600;padding-bottom:12px;">{{company}}</td>
                      </tr>
                      <tr>
                        <td style="font-size:12px;color:#80868b;padding-bottom:4px;">Subject</td>
                      </tr>
                      <tr>
                        <td style="font-size:14px;color:#1a1a1a;font-weight:600;padding-bottom:12px;">{{subject}}</td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Message -->
          <tr>
            <td style="padding-bottom:8px;font-size:12px;color:#80868b;">Message</td>
          </tr>
          <tr>
            <td style="padding-bottom:24px;font-size:14px;color:#5f6368;line-height:1.6;background-color:#f8f9fa;border-radius:8px;padding:16px 20px;">
              {{message}}
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding:24px 0 0;border-top:1px solid #e8eaed;"></td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding-top:12px;font-size:12px;color:#80868b;line-height:1.5;">
              AkovoLabs &mdash; AI-Powered Network Security Analytics
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
