<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{subject}}</title>
</head>
<body style="margin:0;padding:0;background-color:#ffffff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#ffffff;">
    <tr>
      <td align="center" style="padding:48px 24px 24px;">

        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;">

          <!-- Logo / Brand -->
          <tr>
            <td style="padding-bottom:32px;font-size:22px;font-weight:700;color:#1a1a1a;letter-spacing:-0.3px;">
              Hi There,
            </td>
          </tr>

          <!-- Subject line -->
          <tr>
            <td style="padding-bottom:8px;font-size:18px;font-weight:700;color:#1a1a1a;line-height:1.3;">
              {{subject}}
            </td>
          </tr>

          <!-- Message -->
          <tr>
            <td style="padding-bottom:24px;font-size:14px;color:#5f6368;line-height:1.6;">
              {{message}}
            </td>
          </tr>

          <!-- OTP Code -->
          <tr>
            <td style="padding-bottom:8px;">
              <table role="presentation" cellpadding="0" cellspacing="0" style="background-color:#f8f9fa;border-radius:8px;">
                <tr>
                  <td align="center" style="padding:6px 16px;font-size:28px;font-weight:700;color:#1a1a1a;letter-spacing:6px;font-family:'Courier New',monospace;">
                    {{otp_code}}
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Hint -->
          <tr>
            <td style="padding-bottom:8px;font-size:12px;color:#80868b;line-height:1.5;">
              This code expires in 5 minutes. If you didn't request this email, you can safely ignore it.
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding:24px 0 0;border-top:1px solid #e8eaed;"></td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding-top:12px;font-size:12px;color:#80868b;line-height:1.5;">
              AkovoLabs &mdash; AI-Powered Network Security Analytics
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
